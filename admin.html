<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LIVE ADMIN</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #101010;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans JP", sans-serif;
      padding: 24px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: #181818;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0.04em;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .sub,
    .note {
      color: #aaa;
      font-size: 13px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 10px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 700px) {
      .two {
        grid-template-columns: 1fr;
      }
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 14px 16px;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: #fff;
      color: #111;
    }

    button:hover {
      opacity: 0.86;
    }

    .blue {
      background: #4ea1ff;
      color: #fff;
    }

    .green {
      background: #55d98b;
      color: #061309;
    }

    .danger {
      background: #ff5656;
      color: #fff;
    }

    .dark {
      background: #000;
      color: #fff;
      border: 1px solid #555;
    }

    .ghost {
      background: transparent;
      color: #fff;
      border: 1px solid #444;
    }

    input,
    textarea {
      width: 100%;
      background: #070707;
      color: #fff;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      margin-top: 8px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }

    label {
      display: block;
      color: #ccc;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .status {
      background: #050505;
      color: #bbb;
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      white-space: pre-wrap;
      overflow: auto;
      max-height: 260px;
    }

    .hidden {
      display: none;
    }

    .login {
      max-width: 420px;
      margin: 80px auto;
    }

    .session-card {
      background: #101010;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .session-id {
      color: #999;
      font-size: 12px;
      word-break: break-all;
    }

    .urlbox {
      background: #050505;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      font-size: 13px;
      color: #ddd;
      word-break: break-all;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .active-badge {
      display: inline-block;
      background: #55d98b;
      color: #061309;
      font-size: 12px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 999px;
      margin-left: 8px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
  </style>
</head>

<body>
  <section id="loginPanel" class="login panel">
    <h1>ADMIN LOGIN</h1>
    <p class="note">運営アカウントでログインしてください。</p>

    <input id="email" type="email" placeholder="メールアドレス">
    <input id="password" type="password" placeholder="パスワード">

    <div style="margin-top: 12px;">
      <button id="loginBtn">ログイン</button>
    </div>

    <p id="loginMessage" class="note"></p>
  </section>

  <main id="adminPanel" class="wrap hidden">
    <div class="topbar">
      <div>
        <h1>LIVE CONTROL</h1>
        <div class="sub">
          現在操作中の公演：<span id="sessionName"></span>
        </div>
      </div>

      <div>
        <button id="copyCurrentGameUrlBtn" class="ghost">現在の参加者URLをコピー</button>
      </div>
    </div>

    <section class="panel">
      <h2>公演を追加</h2>

      <div class="two">
        <div>
          <label>公演名</label>
          <input id="newSessionTitle" type="text" placeholder="例：セレクトワード 8/10 11:00回">
        </div>

        <div>
          <label>公演日時</label>
          <input id="newSessionDateTime" type="datetime-local">
        </div>
      </div>

      <div style="margin-top: 12px;">
        <label>初期メッセージ</label>
        <input id="newSessionMessage" type="text" value="開演までお待ちください。">
      </div>

      <div style="margin-top: 12px;">
        <label>開演前YouTube動画URL</label>
        <textarea id="newSessionYoutubeUrls" placeholder="1行に1つずつYouTube URLを入れてください。
例：
https://www.youtube.com/watch?v=xxxxxxxxxxx
https://youtu.be/yyyyyyyyyyy"></textarea>
        <p class="note">複数入れると、開演前に順番に再生されます。</p>
      </div>

      <div style="margin-top: 12px;">
        <button id="createSessionBtn" class="green">公演を追加してURL生成</button>
      </div>

      <div id="createdUrls" class="hidden">
        <h3 style="margin-top: 18px;">生成されたURL</h3>

        <div class="urlbox">
          <strong>参加者用URL</strong><br>
          <span id="createdGameUrl"></span>
        </div>
        <div class="mini-grid">
          <button id="copyGameUrlBtn">参加者URLをコピー</button>
          <button id="openGameUrlBtn" class="blue">参加者画面を開く</button>
        </div>

        <div class="urlbox">
          <strong>運営用URL</strong><br>
          <span id="createdAdminUrl"></span>
        </div>
        <div class="mini-grid">
          <button id="copyAdminUrlBtn">運営URLをコピー</button>
          <button id="openAdminUrlBtn" class="blue">この公演を操作</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>開演前YouTube操作</h2>

      <p class="note">
        音声ONは、参加者がゲーム画面で「音声ONで参加」を選んでいる場合のみ反映されます。
      </p>

      <div class="grid" style="margin-top: 12px;">
        <button id="videoPlayBtn" class="blue">動画再生</button>
        <button id="videoStopBtn" class="dark">動画ストップ</button>
        <button id="videoSoundOnBtn" class="green">全体音声ON</button>
        <button id="videoSoundOffBtn" class="danger">全体音声OFF</button>
        <button id="videoNextBtn" class="blue">次の動画へ</button>
        <button id="videoRestartBtn">最初から再生</button>
      </div>

      <div style="margin-top: 16px;">
        <label>現在操作中の公演のYouTube URL</label>
        <textarea id="currentYoutubeUrls" placeholder="1行に1つずつYouTube URLを入れてください。"></textarea>
        <div class="grid" style="margin-top: 10px;">
          <button id="saveCurrentYoutubeBtn" class="green">YouTube設定を保存</button>
          <button id="disableYoutubeBtn" class="danger">YouTubeを非表示</button>
          <button id="enableYoutubeBtn" class="blue">YouTubeを表示</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>公演一覧</h2>
      <div id="sessionList" class="note">読み込み中...</div>
    </section>

    <section class="panel">
      <h2>画面操作</h2>
      <div class="grid">
        <button data-screen="wait">待機</button>
        <button data-screen="opening" class="blue">OP開始</button>
        <button data-screen="question">問題</button>
        <button data-screen="answer">判定</button>
        <button data-screen="glitch" class="danger">グリッチ</button>
        <button data-screen="blackout" class="dark">暗転</button>
        <button data-screen="clear" class="green">クリア</button>
        <button data-screen="gameover" class="danger">ゲームオーバー</button>
      </div>
    </section>

    <section class="panel">
      <h2>メッセージ</h2>
      <textarea id="messageInput" placeholder="参加者画面に表示する文章"></textarea>
      <button id="sendMessageBtn" style="margin-top: 10px;">メッセージ反映</button>
    </section>

    <section class="panel">
      <h2>タイマー</h2>
      <input id="timerSeconds" type="number" min="1" value="60">
      <div class="grid" style="margin-top: 10px;">
        <button id="startTimerBtn" class="blue">タイマー開始</button>
        <button id="stopTimerBtn" class="dark">タイマー停止</button>
      </div>
    </section>

    <section class="panel">
      <h2>入力ロック</h2>
      <div class="grid">
        <button id="lockBtn" class="danger">ロック</button>
        <button id="unlockBtn" class="green">解除</button>
      </div>
    </section>

    <section class="panel">
      <h2>テンプレ進行</h2>
      <div class="grid">
        <button id="presetWait">開演待機</button>
        <button id="presetStart" class="blue">ゲーム開始</button>
        <button id="presetClear" class="green">成功演出</button>
        <button id="presetFailed" class="danger">失敗演出</button>
      </div>
    </section>

    <section class="panel">
      <h2>現在の状態</h2>
      <div id="status" class="status">読み込み中...</div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      update,
      set
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB4bBZIH9hP1sRBRwRWU4MNwVf91d9pgrQ",
      authDomain: "riddle-live-control.firebaseapp.com",
      databaseURL: "https://riddle-live-control-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "riddle-live-control",
      storageBucket: "riddle-live-control.firebasestorage.app",
      messagingSenderId: "750925660526",
      appId: "1:750925660526:web:5678b5a966ed43ce19017f"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);
    const auth = getAuth(firebaseApp);

    const params = new URLSearchParams(location.search);
    const sessionId = params.get("session") || "selectword_test";

    const loginPanel = document.getElementById("loginPanel");
    const adminPanel = document.getElementById("adminPanel");
    const loginMessage = document.getElementById("loginMessage");
    const statusEl = document.getElementById("status");
    const messageInput = document.getElementById("messageInput");
    const sessionList = document.getElementById("sessionList");
    const currentYoutubeUrls = document.getElementById("currentYoutubeUrls");

    const createdUrls = document.getElementById("createdUrls");
    const createdGameUrl = document.getElementById("createdGameUrl");
    const createdAdminUrl = document.getElementById("createdAdminUrl");

    let serverOffset = 0;
    let latestGameUrl = "";
    let latestAdminUrl = "";
    let currentSessionData = null;

    document.getElementById("sessionName").textContent = sessionId;

    onValue(ref(db, ".info/serverTimeOffset"), snapshot => {
      serverOffset = snapshot.val() || 0;
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        loginMessage.textContent = "ログイン中...";
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        loginMessage.textContent = "ログインできませんでした。メールアドレス・パスワードを確認してください。";
        console.error(error);
      }
    });

    onAuthStateChanged(auth, user => {
      if (!user) return;

      loginPanel.classList.add("hidden");
      adminPanel.classList.remove("hidden");

      watchCurrentSession();
      watchSessionList();
    });

    function watchCurrentSession() {
      onValue(ref(db, `sessions/${sessionId}`), snapshot => {
        const state = snapshot.val() || {};
        currentSessionData = state;

        statusEl.textContent = JSON.stringify(state, null, 2);

        if (document.activeElement !== messageInput) {
          messageInput.value = state.message || "";
        }

        if (document.activeElement !== currentYoutubeUrls) {
          const playlist = state.videoControl?.playlist || [];
          currentYoutubeUrls.value = playlist.map(id => `https://www.youtube.com/watch?v=${id}`).join("\n");
        }
      });
    }

    function watchSessionList() {
      onValue(ref(db, "sessions"), snapshot => {
        const sessions = snapshot.val();

        if (!sessions) {
          sessionList.textContent = "まだ公演がありません。";
          return;
        }

        const entries = Object.entries(sessions).sort((a, b) => {
          const aTime = a[1].eventAt || "";
          const bTime = b[1].eventAt || "";
          return String(aTime).localeCompare(String(bTime));
        });

        sessionList.innerHTML = "";

        entries.forEach(([id, data]) => {
          const gameUrl = buildGameUrl(id);
          const adminUrl = buildAdminUrl(id);

          const playlistCount = data.videoControl?.playlist?.length || 0;

          const card = document.createElement("div");
          card.className = "session-card";

          card.innerHTML = `
            <h3>
              ${escapeHtml(data.title || "無題の公演")}
              ${id === sessionId ? `<span class="active-badge">操作中</span>` : ""}
            </h3>
            <div class="session-id">ID: ${escapeHtml(id)}</div>
            <div class="note">
              日時：${escapeHtml(formatEventAt(data.eventAt))}<br>
              YouTube動画：${playlistCount}本
            </div>

            <div class="urlbox">
              <strong>参加者用URL</strong><br>
              ${escapeHtml(gameUrl)}
            </div>

            <div class="mini-grid">
              <button data-copy="${escapeHtml(gameUrl)}">参加者URLコピー</button>
              <button data-open="${escapeHtml(gameUrl)}" class="blue">参加者画面</button>
              <button data-open="${escapeHtml(adminUrl)}" class="green">この公演を操作</button>
            </div>
          `;

          sessionList.appendChild(card);
        });

        sessionList.querySelectorAll("[data-copy]").forEach(button => {
          button.addEventListener("click", () => {
            copyText(button.dataset.copy);
          });
        });

        sessionList.querySelectorAll("[data-open]").forEach(button => {
          button.addEventListener("click", () => {
            location.href = button.dataset.open;
          });
        });
      });
    }

    document.getElementById("createSessionBtn").addEventListener("click", async () => {
      const title = document.getElementById("newSessionTitle").value.trim();
      const eventAt = document.getElementById("newSessionDateTime").value;
      const initialMessage = document.getElementById("newSessionMessage").value.trim() || "開演までお待ちください。";
      const youtubeText = document.getElementById("newSessionYoutubeUrls").value.trim();

      if (!title) {
        alert("公演名を入力してください。");
        return;
      }

      if (!eventAt) {
        alert("公演日時を入力してください。");
        return;
      }

      const playlist = extractYouTubeIds(youtubeText);
      const newSessionId = generateSessionId(title, eventAt);
      const now = Date.now() + serverOffset;

      const data = {
        title,
        eventAt,
        screen: "wait",
        message: initialMessage,
        locked: true,
        timerEndAt: null,
        started: false,
        createdAt: now,
        updatedAt: now,
        videoControl: {
          enabled: playlist.length > 0,
          playlist,
          index: 0,
          playing: playlist.length > 0,
          muted: true,
          command: "init",
          commandId: 0,
          updatedAt: now
        }
      };

      try {
        await set(ref(db, `sessions/${newSessionId}`), data);

        latestGameUrl = buildGameUrl(newSessionId);
        latestAdminUrl = buildAdminUrl(newSessionId);

        createdGameUrl.textContent = latestGameUrl;
        createdAdminUrl.textContent = latestAdminUrl;
        createdUrls.classList.remove("hidden");

        alert("公演を追加しました。参加者URLを案内できます。");
      } catch (error) {
        alert("公演を追加できませんでした。FirebaseのRulesやログイン状態を確認してください。");
        console.error(error);
      }
    });

    document.getElementById("saveCurrentYoutubeBtn").addEventListener("click", async () => {
      const playlist = extractYouTubeIds(currentYoutubeUrls.value);
      const now = Date.now() + serverOffset;

      await update(ref(db, `sessions/${sessionId}/videoControl`), {
        enabled: playlist.length > 0,
        playlist,
        index: 0,
        playing: playlist.length > 0,
        muted: true,
        command: "reload",
        commandId: Date.now(),
        updatedAt: now
      });

      alert("YouTube設定を保存しました。");
    });

    document.getElementById("disableYoutubeBtn").addEventListener("click", () => {
      update(ref(db, `sessions/${sessionId}/videoControl`), {
        enabled: false,
        playing: false,
        command: "stop",
        commandId: Date.now(),
        updatedAt: Date.now() + serverOffset
      });
    });

    document.getElementById("enableYoutubeBtn").addEventListener("click", () => {
      update(ref(db, `sessions/${sessionId}/videoControl`), {
        enabled: true,
        command: "reload",
        commandId: Date.now(),
        updatedAt: Date.now() + serverOffset
      });
    });

    document.getElementById("videoPlayBtn").addEventListener("click", () => {
      sendVideoCommand("play", {
        playing: true
      });
    });

    document.getElementById("videoStopBtn").addEventListener("click", () => {
      sendVideoCommand("pause", {
        playing: false
      });
    });

    document.getElementById("videoSoundOnBtn").addEventListener("click", () => {
      sendVideoCommand("unmute", {
        muted: false
      });
    });

    document.getElementById("videoSoundOffBtn").addEventListener("click", () => {
      sendVideoCommand("mute", {
        muted: true
      });
    });

    document.getElementById("videoNextBtn").addEventListener("click", () => {
      sendVideoCommand("next", {
        playing: true
      });
    });

    document.getElementById("videoRestartBtn").addEventListener("click", () => {
      sendVideoCommand("restart", {
        playing: true
      });
    });

    async function sendVideoCommand(command, extra = {}) {
      const now = Date.now() + serverOffset;

      try {
        await update(ref(db, `sessions/${sessionId}/videoControl`), {
          ...extra,
          command,
          commandId: Date.now(),
          updatedAt: now
        });
      } catch (error) {
        alert("動画操作に失敗しました。ログイン状態やRulesを確認してください。");
        console.error(error);
      }
    }

    document.getElementById("copyGameUrlBtn").addEventListener("click", () => {
      copyText(latestGameUrl);
    });

    document.getElementById("copyAdminUrlBtn").addEventListener("click", () => {
      copyText(latestAdminUrl);
    });

    document.getElementById("openGameUrlBtn").addEventListener("click", () => {
      if (latestGameUrl) window.open(latestGameUrl, "_blank");
    });

    document.getElementById("openAdminUrlBtn").addEventListener("click", () => {
      if (latestAdminUrl) location.href = latestAdminUrl;
    });

    document.getElementById("copyCurrentGameUrlBtn").addEventListener("click", () => {
      copyText(buildGameUrl(sessionId));
    });

    document.querySelectorAll("[data-screen]").forEach(button => {
      button.addEventListener("click", () => {
        setState({
          screen: button.dataset.screen
        });
      });
    });

    document.getElementById("sendMessageBtn").addEventListener("click", () => {
      setState({
        message: messageInput.value
      });
    });

    document.getElementById("startTimerBtn").addEventListener("click", () => {
      const seconds = Number(document.getElementById("timerSeconds").value || 60);
      const serverNow = Date.now() + serverOffset;

      setState({
        timerEndAt: serverNow + seconds * 1000
      });
    });

    document.getElementById("stopTimerBtn").addEventListener("click", () => {
      setState({
        timerEndAt: null
      });
    });

    document.getElementById("lockBtn").addEventListener("click", () => {
      setState({
        locked: true
      });
    });

    document.getElementById("unlockBtn").addEventListener("click", () => {
      setState({
        locked: false
      });
    });

    document.getElementById("presetWait").addEventListener("click", () => {
      setState({
        screen: "wait",
        message: "開演までお待ちください。",
        locked: true,
        timerEndAt: null,
        started: false
      });
    });

    document.getElementById("presetStart").addEventListener("click", () => {
      setState({
        screen: "opening",
        message: "システムを起動します。\n準備はよろしいですか？",
        locked: false,
        timerEndAt: null,
        started: true
      });
    });

    document.getElementById("presetClear").addEventListener("click", () => {
      setState({
        screen: "clear",
        message: "システムの奪還に成功しました。",
        locked: true,
        timerEndAt: null
      });
    });

    document.getElementById("presetFailed").addEventListener("click", () => {
      setState({
        screen: "gameover",
        message: "システムの奪還に失敗しました。",
        locked: true,
        timerEndAt: null
      });
    });

    async function setState(data) {
      const payload = {
        ...data,
        commandId: Date.now(),
        updatedAt: Date.now() + serverOffset
      };

      try {
        await update(ref(db, `sessions/${sessionId}`), payload);
      } catch (error) {
        alert("更新できませんでした。FirebaseのRules、UID、ログイン状態を確認してください。");
        console.error(error);
      }
    }

    function extractYouTubeIds(text) {
      if (!text) return [];

      const parts = text
        .split(/[\n,]+/)
        .map(v => v.trim())
        .filter(Boolean);

      const ids = [];

      parts.forEach(part => {
        const id = extractYouTubeId(part);
        if (id && !ids.includes(id)) {
          ids.push(id);
        }
      });

      return ids;
    }

    function extractYouTubeId(value) {
      if (!value) return "";

      const trimmed = value.trim();

      if (/^[a-zA-Z0-9_-]{11}$/.test(trimmed)) {
        return trimmed;
      }

      try {
        const url = new URL(trimmed);

        if (url.hostname.includes("youtu.be")) {
          return url.pathname.replace("/", "").split("/")[0].trim();
        }

        if (url.hostname.includes("youtube.com")) {
          if (url.searchParams.get("v")) {
            return url.searchParams.get("v").trim();
          }

          const embedMatch = url.pathname.match(/\/embed\/([^/?]+)/);
          if (embedMatch) return embedMatch[1].trim();

          const shortsMatch = url.pathname.match(/\/shorts\/([^/?]+)/);
          if (shortsMatch) return shortsMatch[1].trim();
        }
      } catch (error) {
        return "";
      }

      return "";
    }

    function generateSessionId(title, eventAt) {
      const datePart = eventAt
        .replaceAll("-", "")
        .replaceAll(":", "")
        .replace("T", "_");

      const titlePart = title
        .toLowerCase()
        .replace(/[^\w\u3040-\u30ff\u3400-\u9fff]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 20) || "event";

      const randomPart = Math.random().toString(36).slice(2, 8);

      return `${titlePart}_${datePart}_${randomPart}`;
    }

    function buildGameUrl(id) {
      const url = new URL(location.href);
      url.search = "";
      url.hash = "";

      if (url.pathname.endsWith("admin.html")) {
        url.pathname = url.pathname.replace(/admin\.html$/, "game.html");
      } else {
        url.pathname = url.pathname.replace(/\/$/, "") + "/game.html";
      }

      url.searchParams.set("session", id);
      return url.toString();
    }

    function buildAdminUrl(id) {
      const url = new URL(location.href);
      url.search = "";
      url.hash = "";

      if (!url.pathname.endsWith("admin.html")) {
        url.pathname = url.pathname.replace(/\/$/, "") + "/admin.html";
      }

      url.searchParams.set("session", id);
      return url.toString();
    }

    async function copyText(text) {
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        alert("コピーしました。");
      } catch (error) {
        prompt("コピーしてください。", text);
      }
    }

    function formatEventAt(value) {
      if (!value) return "未設定";

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;

      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const h = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");

      return `${y}/${m}/${d} ${h}:${min}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
